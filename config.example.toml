addr = ":8089"
data_url = "https://meshcore.ninja/networks.json"
allow_origin = "*"
tangleveil = "wss://tangleveil.meshcore.ninja/ws"

# Empty means monitor every catalog network exposed by Tangleveil. To limit live
# ingest, list network IDs from the published network records.
networks = []
network_update_interval = "5m"

dedup_window = "15m"
link_halflife = "24h"
observer_ttl = "1h"

db = "core.db"
links_db = "links.db"
persist_interval = "20s"
counter_persist_interval = "20s"
node_persist_interval = "20s"
advert_persist_interval = "20s"
link_persist_interval = "20s"
observer_persist_interval = "12s"

import_url = "https://map.meshcore.io/api/v1/nodes?binary=0&short=0"
import_interval = "1h"

# Versioned full-map snapshots, zstd-compressed, written every interval.
# snapshot_base_url is prepended to snapshot URLs in latest.json (no trailing slash).
snapshot_dir = "snapshots"
snapshot_base_url = "https://api.meshcore.ninja"
snapshot_interval = "5m"

# Node quality flagging. The flagger periodically scans nodes against each
# network's published coverage polygons (network_area_url) and tags any whose GPS
# is farther than far_from_network_km from every network it belongs to. Flags
# surface on /api/nodes, the map snapshot, and /api/flags. Set network_area_url
# empty to disable flagging.
network_area_url = "https://meshcore.ninja/network-area/all.geojson"
network_area_interval = "6h"
flag_interval = "15m"
far_from_network_km = 1000.0
